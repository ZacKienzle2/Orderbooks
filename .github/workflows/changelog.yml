name: Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate CHANGELOG.md
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --output CHANGELOG.md

      - name: Detect drift
        id: drift
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open changelog update PR
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@6cd32fd93684475c31847837f87bb135d40a2b79 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/changelog-auto
          commit-message: "chore(changelog): regenerate from conventional commits"
          title: "chore(changelog): regenerate from conventional commits"
          body: |
            Automated changelog regeneration from `git-cliff`. Reviewer just needs
            to confirm the rendering looks right; merging this PR is purely a
            documentation refresh.
          labels: |
            chore
            docs
          delete-branch: true
          sign-commits: false
