name: Security

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    # Daily 04:17 UTC drift check against the latest advisory database.
    - cron: "17 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Export requirements for pip-audit
        run: uv pip compile pyproject.toml --all-extras -o requirements.txt

      - name: Audit with pip-audit
        run: |
          set -euo pipefail
          pipx run --spec 'pip-audit==2.9.0' pip-audit \
            --requirement requirements.txt \
            --strict \
            --progress-spinner=off

  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          uv run --with cyclonedx-bom \
            cyclonedx-py environment \
              --output-format json \
              --output-file sbom.cdx.json \
              .venv

      - name: Upload SBOM artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30
