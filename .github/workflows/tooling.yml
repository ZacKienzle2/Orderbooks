name: Tooling

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/harness/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/tooling.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/harness/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/tooling.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tooling-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: ${{ matrix.python }} - lint, type-check, test harness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Pin Python ${{ matrix.python }}
        run: uv python pin ${{ matrix.python }}

      - name: Sync harness dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest harness suite
        run: |
          set -euo pipefail
          if [ -d tests/harness ]; then
            uv run pytest -q tests/harness
          else
            echo "tests/harness not present yet; skipping pytest"
          fi

      - name: cmake-format check
        run: |
          set -euo pipefail
          # shellcheck disable=SC2046
          uv run cmake-format --check $(git ls-files '*.cmake' 'CMakeLists.txt' '**/CMakeLists.txt')
