default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

default_stages:
  - pre-commit

minimum_pre_commit_version: "3.5.0"

fail_fast: false

# Hooks come in two flavours:
#
#   1. Pure-Python or pure-Node hooks pulled directly from upstream repos.
#      Pre-commit installs them in isolated envs at first run.
#   2. Local hooks that shell out to system binaries installed via
#      `scripts/bootstrap.sh`. Used for any tool that would otherwise
#      download a binary at install time (and so depend on the host
#      Python's SSL CA chain being healthy).

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-illegal-windows-names
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: forbid-submodules
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: check-json
      - id: check-toml
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-xml
      - id: pretty-format-json
        args: ["--autofix", "--no-sort-keys", "--indent=2"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["--strict", "--config-file=.yamllint.yaml"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --force-scope
          - feat
          - fix
          - perf
          - refactor
          - docs
          - test
          - build
          - ci
          - chore
          - style
          - revert

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        description: Format C/C++/CUDA sources via the system clang-format.
        entry: clang-format
        language: system
        types_or: [c++, c, cuda]
        args: ["-i", "--style=file"]

      - id: cmake-format
        name: cmake-format
        description: Format CMake sources via the system cmake-format.
        entry: cmake-format
        language: system
        files: '(CMakeLists\.txt|\.cmake)$'
        args: ["--in-place"]

      - id: cmake-lint
        name: cmake-lint
        description: Lint CMake sources via the system cmake-lint.
        entry: cmake-lint
        language: system
        files: '(CMakeLists\.txt|\.cmake)$'

      - id: shellcheck
        name: shellcheck
        description: Lint shell scripts via the system shellcheck.
        entry: shellcheck
        language: system
        types: [shell]
        require_serial: false
        args: ["--severity=warning", "--exclude=SC2310"]

      - id: typos
        name: typos
        description: Spell-check repo via the system typos binary.
        entry: typos
        language: system
        pass_filenames: false

      - id: gitleaks
        name: gitleaks
        description: Scan filesystem for leaked secrets via the system gitleaks binary.
        entry: gitleaks detect --no-git --redact --verbose --exit-code=1
        language: system
        pass_filenames: false

      - id: actionlint
        name: actionlint
        description: Lint GitHub Actions workflows via the system actionlint binary.
        entry: actionlint
        language: system
        files: '^\.github/workflows/.*\.ya?ml$'
        types: [yaml]
