# git-cliff configuration. Conventional Commits 1.0.0 grouping.
# CHANGELOG.md is regenerated from this config on every push to main and on
# every release tag. Do not edit CHANGELOG.md by hand.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog 1.1.0](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning 2.0.0](https://semver.org/spec/v2.0.0.html).
Entries are generated from [Conventional Commits 1.0.0](https://www.conventionalcommits.org/en/v1.0.0/)
by [git-cliff](https://git-cliff.org).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
  {% if commit.breaking %} [**breaking**]{% endif %}\
  {% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/ZacKienzle2/Orderbooks/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = """
[Unreleased]: https://github.com/ZacKienzle2/Orderbooks/compare/{% if releases | length > 0 %}{{ releases[0].version }}...HEAD{% else %}HEAD{% endif %}
{% for release in releases -%}
  {% if release.previous.version -%}
    [{{ release.version | trim_start_matches(pat="v") }}]: \
      https://github.com/ZacKienzle2/Orderbooks/compare/{{ release.previous.version }}...{{ release.version }}
  {% endif -%}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"

commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^style",    group = "Changed" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^build",    group = "Build" },
  { message = "^ci",       group = "CI" },
  { message = "^chore",    group = "Maintenance" },
  { message = "^revert",   group = "Reverts" },
  { message = "^security", group = "Security" },
  { body    = ".*[Ss]ecurity",       group = "Security" },
  { body    = ".*[Bb]reaking.*",     group = "Breaking Changes" },
  { message = "^.*",       group = "Other" },
]

commit_preprocessors = [
  # Strip Refs / Closes / Fixes footers from the rendered subject; they remain
  # in the git history but should not clutter the changelog body.
  { pattern = "\\s*\\((?:Refs|Closes|Fixes) #\\d+\\)$", replace = "" },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/ZacKienzle2/Orderbooks/issues/$1" },
]
